<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: "Inter", sans-serif;
    }
  </style>
  <line x1="340" y1="60" x2="340" y2="520" stroke="#ccc" stroke-width="1"/>
  <line x1="80" y1="290" x2="600" y2="290" stroke="#ccc" stroke-width="1"/>
 
  <text x="340" y="44" text-anchor="middle" font-size="14" font-weight="500" fill="currentColor">Drama</text>
  <text x="340" y="538" text-anchor="middle" font-size="14" font-weight="500" fill="currentColor">Sitcom</text>
  <text x="60" y="290" text-anchor="end" font-size="14" font-weight="500" fill="currentColor">Guerrilla</text>
  <text x="617" y="290" text-anchor="start" font-size="14" font-weight="500" fill="currentColor">Imperial</text>
 
  <rect x="81" y="61" width="258" height="228" rx="4" fill="#f5f5f5" opacity="0.8"/>
  <rect x="341" y="61" width="258" height="228" rx="4" fill="#f5f5f5" opacity="0.5"/>
  <rect x="81" y="291" width="258" height="228" rx="4" fill="#f5f5f5" opacity="0.5"/>
  <rect x="341" y="291" width="258" height="228" rx="4" fill="#f5f5f5" opacity="0.3"/>
 
  <text x="210" y="100" text-anchor="middle" font-size="12" fill="#444">Guerrilla drama</text>
  <text x="210" y="116" text-anchor="middle" font-size="12" fill="#777">earned + honest</text>
 
  <text x="470" y="100" text-anchor="middle" font-size="12" fill="#444">Imperial drama</text>
  <text x="470" y="116" text-anchor="middle" font-size="12" fill="#777">polished + authoritative</text>
 
  <text x="210" y="380" text-anchor="middle" font-size="12" fill="#444">Guerrilla sitcom</text>
  <text x="210" y="396" text-anchor="middle" font-size="12" fill="#777">personal but hollow</text>
 
  <text x="470" y="380" text-anchor="middle" font-size="12" fill="#444">Imperial sitcom</text>
  <text x="470" y="396" text-anchor="middle" font-size="12" fill="#777">LinkedIn bots</text>
 
  <!-- Teal: asthma hook -->
  <rect x="130" y="148" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="195" y="166" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">David Sedaris</text>
  <text x="195" y="181" text-anchor="middle" font-size="11" fill="#0F6E56">confessional, specific</text>
 
  <!-- Purple: Orwell / Didion -->
  <rect x="100" y="210" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="160" y="228" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Orwell, Didion</text>
  <text x="160" y="243" text-anchor="middle" font-size="11" fill="#534AB7">earned authority</text>
 
  <!-- Blue: Paul Graham -->
  <rect x="390" y="148" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="450" y="166" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Paul Graham</text>
  <text x="450" y="181" text-anchor="middle" font-size="11" fill="#185FA5">logical, declarative</text>
 
  <rect x="360" y="428" width="180" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="450" y="446" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Telling a reader what to feel</text>
  <text x="450" y="461" text-anchor="middle" font-size="11" fill="#854F0B">generic tension signals</text>
 
  <text x="340" y="560" text-anchor="middle" font-size="12" fill="#888">The goal: top-left. The trap: bottom-right.</text>
</svg>
